name: Agentica CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: windows-latest # Matching USER OS for consistency with scripts

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        python -m playwright install chromium

    - name: Run Workspace Verification
      run: |
        python scripts/verify_all.py . --no-e2e

    - name: Verify Exchange Registry
      run: |
        python scripts/exchange.py list
        python scripts/exchange.py sync
